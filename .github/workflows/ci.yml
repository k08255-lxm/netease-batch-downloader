name: Build And Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Show Go version
        run: go version

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      release_name: ${{ steps.release_meta.outputs.release_name }}
      package_suffix: ${{ steps.release_meta.outputs.package_suffix }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Derive build metadata
        id: build_meta
        run: |
          TAG=$(git tag --points-at HEAD | head -n 1)
          if [ -n "$TAG" ]; then
            VERSION="$TAG"
          else
            VERSION="$(git rev-parse --short=7 HEAD)"
          fi
          COMMIT="$(git rev-parse HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"

      - name: Derive release metadata
        id: release_meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            echo "release_tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
            echo "release_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
            echo "package_suffix=$TAG_NAME" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "release_tag=latest" >> "$GITHUB_OUTPUT"
            echo "release_name=latest" >> "$GITHUB_OUTPUT"
            echo "package_suffix=latest" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="$(git rev-parse --short=7 HEAD)"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            echo "release_name=" >> "$GITHUB_OUTPUT"
            echo "package_suffix=pr-$SHORT_SHA" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Show Go version
        run: go version

      - name: Download modules
        run: go mod download

      - name: Build and package
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
          BUILD_VERSION: ${{ steps.build_meta.outputs.version }}
          BUILD_COMMIT: ${{ steps.build_meta.outputs.commit }}
          BUILD_TIME: ${{ steps.build_meta.outputs.build_time }}
          PACKAGE_SUFFIX: ${{ steps.release_meta.outputs.package_suffix }}
          ARCHIVE_EXT: zip
          BINARY_NAME: netease-batch.exe
        shell: bash
        run: |
          PACKAGE_NAME="netease-batch-${GOOS}-${GOARCH}-${PACKAGE_SUFFIX}"
          PACKAGE_DIR="dist/$PACKAGE_NAME"
          ARCHIVE_PATH="dist/${PACKAGE_NAME}.${ARCHIVE_EXT}"

          mkdir -p "$PACKAGE_DIR"

          go build -trimpath \
            -ldflags "-X main.versionName=$BUILD_VERSION -X main.commitSHA=$BUILD_COMMIT -X main.buildTime=$BUILD_TIME" \
            -o "$PACKAGE_DIR/$BINARY_NAME" \
            ./cmd/netease-batch

          go build -trimpath \
            -ldflags "-H=windowsgui" \
            -o "$PACKAGE_DIR/setup_netease_batch_windows.exe" \
            ./cmd/netease-batch-launcher

          cp README.md config_example.ini LICENSE UPSTREAM.md "$PACKAGE_DIR/"
          cp build_netease_batch_windows.bat download_netease_playlist.bat setup_netease_batch_windows.bat setup_netease_batch_windows.ps1 "$PACKAGE_DIR/"

          export PACKAGE_DIR ARCHIVE_PATH ARCHIVE_EXT
          python3 - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          package_dir = Path(os.environ["PACKAGE_DIR"])
          archive_path = Path(os.environ["ARCHIVE_PATH"])
          archive_ext = os.environ["ARCHIVE_EXT"]

          if archive_ext == "zip":
              with zipfile.ZipFile(archive_path, "w", zipfile.ZIP_DEFLATED) as zf:
                  for file_path in sorted(package_dir.rglob("*")):
                      if file_path.is_file():
                          zf.write(file_path, file_path.relative_to(package_dir.parent))
          else:
              raise SystemExit(f"unsupported archive extension: {archive_ext}")
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: netease-batch-windows-amd64
          path: |
            dist/*.zip

  release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Generate release notes
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            PREV_TAG=$(git describe --tags --abbrev=0 "$TAG_NAME"^ 2>/dev/null || true)
            {
              echo "## Changes"
              if [ -n "$PREV_TAG" ]; then
                echo ""
                echo "From $PREV_TAG to $TAG_NAME"
                git log --pretty=format:"- %s (%an)" "$PREV_TAG".."$TAG_NAME"
              else
                echo ""
                git log --pretty=format:"- %s (%an)" "$TAG_NAME"
              fi
            } > release-notes.md
          else
            {
              echo "## Latest Main Build"
              echo ""
              echo "- Branch: \`main\`"
              echo "- Commit: \`${GITHUB_SHA}\`"
              echo ""
              echo "### Recent Changes"
              git log --pretty=format:"- %s (%an)" -n 20 "${GITHUB_SHA}"
            } > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: ${{ needs.build.outputs.release_name }}
          prerelease: ${{ needs.build.outputs.is_prerelease }}
          target_commitish: ${{ github.sha }}
          append_body: false
          overwrite_files: true
          body_path: release-notes.md
          files: |
            dist/*.zip
