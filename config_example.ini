# ========================================
# netease-batch-downloader 配置文件
# ========================================

# 本配置文件只服务于 `netease-batch` 批量下载器。
# GitHub:
# https://github.com/k08255-lxm/netease-batch-downloader

# ========================================
# 下载器基础配置
# ========================================

# 下载超时时长（秒，默认: 60）
DownloadTimeout = 60

# 是否校验文件 MD5（默认: true）
CheckMD5 = true

# 是否启用多线程下载（默认: true）
EnableMultipartDownload = true

# 多线程下载并发数（默认: 4）
MultipartConcurrency = 4

# 多线程下载最小文件大小（MB，默认: 5）
MultipartMinSizeMB = 5

# 可选：最终文件下载代理（HTTP Proxy）
# DownloadProxy = http://127.0.0.1:7890

# ========================================
# 网易云配置
# ========================================

[plugins.netease]

# 完整 Cookie 文本，优先级高于 music_u
# 支持这种格式：
# cookie = `MUSIC_U=...; __csrf=...`
# cookie = `YOUR_NETEASE_COOKIE`

# 只填 MUSIC_U 也可以
music_u = YOUR_MUSIC_U_COOKIE

# 可选：显式指定浏览器来源
# 留空或 auto 时，Windows 下会自动尝试：
# edge / chrome / brave / firefox
# browser = auto

# 可选：指定浏览器 Profile 名称，例如：
# browser_profile = Default
# browser_profile = Profile 1

# 是否启用随机大陆 IP 请求头伪装（默认: true）
spoof_ip = true

# 可选：只代理网易云上游 API / 页面解析请求，不影响最终文件下载
# api_proxy_enabled = false
# api_proxy_type = http
# api_proxy_host = 127.0.0.1
# api_proxy_port = 7891
# api_proxy_auth = user:pass
# api_proxy_headers = {"User-Agent":"Mozilla/5.0"}
